name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the built distributions to PyPI"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              version = tomllib.load(handle)["project"]["version"]

          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"Release tag {tag!r} must match package version tag {expected!r}")
          PY

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Smoke test built wheel
        run: |
          python -m venv /tmp/gtsm-wheel-smoke
          /tmp/gtsm-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/gtsm-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/gtsm-wheel-smoke/bin/gtsm --help

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish distributions
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.publish == 'true'
    environment:
      name: pypi
      url: https://pypi.org/project/galaxy-toolsmith/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
