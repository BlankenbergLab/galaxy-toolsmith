site_name: Galaxy Toolsmith
site_description: Library-first toolkit for Galaxy wrapper dataset, training, and generation workflows
site_url: https://galaxy-toolsmith.tools.blankenberglab.org/
repo_url: https://github.com/BlankenbergLab/galaxy-toolsmith
repo_name: BlankenbergLab/galaxy-toolsmith

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  logo: assets/images/blankenberglab-logo.svg
  favicon: assets/favicon.ico
  language: en
  palette:
    - scheme: default
      primary: green
      accent: amber
  features:
    - navigation.instant
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

plugins:
  - search

extra_css:
  - assets/brand.css

extra:
  generator: false

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Model Selection: models.md
  - Experiments and Results: experiments.md
  - A100 Pipeline Example: example.md
  - Context Ladder Training: context-ladder-training.md
  - CLI Reference: cli-reference.md
  - Architecture and Decisions: architecture.md
  - Deployment: deployment.md
